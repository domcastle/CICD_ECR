name: Deploy Frontend Web

on:
  push:
    branches: [ "main" ]
    paths:
      # 🔥 web 폴더 수정 시에만 이 워크플로우가 실행됨
      - 'web/**'
      - '.github/workflows/web-deploy.yaml'
  repository_dispatch:
    types: [trigger-web-deploy]
permissions:
  contents: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: team1-web
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        # web 폴더 안의 Dockerfile을 빌드
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./web
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Update Kubernetes Manifest
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "GitHub Actions"

        ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}

        # -------------------------------------------------------
        # 🔥 [안전해짐] 이제 파일이 분리되었으므로,
        # k8s/web-deployment.yaml 파일만 딱 집어서 수정하면 됩니다.
        # 복잡한 정규식 없이 image: 부분만 교체해도 안전합니다.
        # -------------------------------------------------------
        sed -i "s|image: .*|image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|" k8s/web-deployment.yaml

        git add k8s/web-deployment.yaml
        git commit -m "Update WEB image tag to $IMAGE_TAG" || echo "No changes to commit"
        git push
