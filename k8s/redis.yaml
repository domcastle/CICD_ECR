---
# 1. Redis 서비스 (Service)
# 파이썬 워커 파드가 'redis'라는 이름으로 접근할 수 있게 해주는 내부 네트워크 설정입니다.
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: justic
  labels:
    app: redis
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: redis
  type: ClusterIP

---
# 2. Redis 디플로이먼트 (Deployment)
# 실제 Redis 컨테이너(파드)를 띄우고 관리하는 설정입니다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: justic
  labels:
    app: redis
spec:
  replicas: 1 # 실행할 파드 개수
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:latest
          ports:
            - containerPort: 6379
              name: redis
          # (선택 사항) 리소스 제한을 설정하여 클러스터 안정성을 높일 수 있습니다.
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"