---
# 1. Redis 서비스 (Service)
# 파이썬 워커 파드가 'redis'라는 이름으로 접근할 수 있게 해주는 내부 네트워크 설정입니다.
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: justic
  labels:
    app: redis
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: redis
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: justic
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:latest
          # [수정] 스냅샷(RDB) 및 AOF 기능을 모두 비활성화하는 인자 추가
          args: 
            - "--save"
            - ""
            - "--appendonly"
            - "no"
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
